<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VitalMen | To-Do List</title>
    <link rel="icon" href="../assets/img/LogoDaEmpresa1.png" type="image/png" />
    <link rel="stylesheet" href="/override/navbar.css" />
    <script defer src="/override/navbar.js"></script>
    <link rel="stylesheet" href="/todolist/todolist.css" />
    <script defer src="/todolist/todolist.js"></script>
  </head>
  <body>
    <nav class="navbar" id="navbar">
      <a href="/" class="logo">
        <img src="../assets/img/LogoDaEmpresa1.png" alt="VitalMen Logo" />
      </a>
      <ul class="nav-links">
        <li><a href="/usuario">PERFIL</a></li>
        <li><a href="/todolist" aria-current="page">SUAS TAREFAS</a></li>
        <li><a href="/config">CONFIGURAÇÕES</a></li>
      </ul>
      <button
        id="theme-toggle"
        class="theme-toggle-button"
        aria-label="Alternar tema"
      >
        🌙
      </button>
      <a href="/login" id="logoutBtn" class="logout-button">Sair</a>
    </nav>

    <main class="board-container">
      <div id="board" class="board"></div>
      <button id="addListBtn" class="add-list-btn">+ Adicionar Lista</button>
    </main>

    <!-- MODAL DE CONFIRMAÇÃO -->
    <div id="confirmModal" class="modal">
      <div class="modal-content">
        <p id="confirmText">Deseja realmente excluir?</p>
        <div class="modal-buttons">
          <button id="confirmYes" class="btn-yes">Sim</button>
          <button id="confirmNo" class="btn-no">Não</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2025 VitalMen. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
