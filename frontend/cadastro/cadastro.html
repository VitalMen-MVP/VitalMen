<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Vitalmen</title>
    <link rel="icon" href="../assets/img/vital-logo.png" type="image/png"/>

    <link
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="../login/login.css" type="text/css"/>
</head>

<body>
    <a href="../index/index.html" class="SetaRetornar">
    <img src="../assets/img/SetaRetornar.png" alt="seta" >
    </a>
<main class="container">
    <form>
        <h1>Cadastro</h1>

        <div class="input-box">
            <input placeholder="Insira seu nome de usuário..." type="text" required/>
            <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
            <input placeholder="Insira seu email..." type="email" required/>
            <i class="bx bxs-user"></i>
        </div>

        <div class="input-box">
            <input placeholder="Digite sua senha..." type="password" required/>
            <i class="bx bxs-lock-alt"></i>
        </div>
        <div class="input-box">
            <input placeholder="Confirme sua senha..." type="password" required/>
            <i class="bx bxs-lock-alt"></i>
        </div>


        <button type="submit" class="login">Cadastrar-se</button>

        <div class="register-link">
            <p>Já tem uma conta? <a href="../login/login.html">Faça o Login</a></p>
        </div>
    </form>
</main>
</body>
</html>
