<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitamen Idea | Minha Jornada de Foco</title>

    <link rel="icon" href="../assets/img/LogoDaEmpresa1.png" type="image/png" />

    <link rel="stylesheet" href="../config/config.css" type="text/css" />
    <link rel="stylesheet" href="../override/navbar.css" type="text/css" />
    <script defer src="../override/navbar.js"></script>
    <script defer src="../config/config.js"></script>
  </head>
  <body>
    <nav class="navbar" id="navbar">
      <a href="/" class="logo">
        <img src="../assets/img/LogoDaEmpresa1.png" alt="VitalMen Idea Logo" />
      </a>
      <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false">
        ☰
      </button>
      <ul class="nav-links">
        <li><a href="/">INICIO</a></li>
        <li><a href="/usuario">USUÁRIO</a></li>
        <li><a href="/todolist">SUAS TAREFAS</a></li>
      </ul>
    </nav>
    <main>
      <section class="config-section">
        <h1>Configurações da Conta</h1>
        <form id="config-form" data-current-avatar="">
          <div class="form-group">
            <label for="avatar">Avatar:</label>
            <input type="file" id="avatar" name="avatar" accept="image/*" />
            <br />
            <img
              id="preview"
              src="../assets/img/profile-placeholder.png"
              alt="preview da imgem"
            />
            <p id="filename"></p>
          </div>
          <div class="form-group">
            <label for="username">Nome de Usuário:</label>
            <input type="text" id="username" name="username"/>
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"/>
          </div>
          <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" />
          </div>
          <div class="form-group">
            <input type="submit" id="confirm" value="Confirmar Alterações" />
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
