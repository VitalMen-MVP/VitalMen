<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Vitalmen</title>
    <link rel="icon" href="../assets/img/vital-logo.png" type="image/png"/>

    <link
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
            rel="stylesheet"
    />
<link rel="stylesheet" href="/login/login.css" type="text/css"/>
</head>

<body>
    <a href="../index/index.html" class="SetaRetornar">
    <img src="../assets/img/SetaRetornar.png" alt="seta" >
    </a>
<main class="container">
    <form>
        <h1>Login</h1>

        <div class="input-box">
            <input placeholder="Usuário" type="email" required/>
            <i class="bx bxs-user"></i>
        </div>

        <div class="input-box">
            <input placeholder="Senha" type="password" required/>
            <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="remember-forgot">
            <label>
                <input type="checkbox"/>
                Lembrar senha
            </label>
            <a href="#">Esqueci a senha</a>
        </div>

        <button type="submit" class="login">Login</button>

        <div class="register-link">
            <p>Não tem uma conta? <a href="../cadastro/cadastro.html">Cadastre-se</a></p>
        </div>
    </form>
</main>
</body>
</html>
